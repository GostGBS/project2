<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Details | vGT Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --brand-red: #ff0000;
            --dark-bg: #000;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background-color: #000 !important;
            border-bottom: 1px solid #222;
        }

        .detail-container {
            margin-top: 100px;
            padding-bottom: 50px;
        }

        .main-img-container {
            width: 100%;
            height: 450px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            background: #111;
        }

        .main-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
        }

        .thumb {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            opacity: 0.6;
            transition: 0.3s;
        }

        .thumb.active,
        .thumb:hover {
            opacity: 1;
            border-color: var(--brand-red);
        }

        .info-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 15px;
            padding: 25px;
            height: 100%;
        }

        .price-tag {
            font-size: 2.5rem;
            color: var(--brand-red);
            font-weight: 800;
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }

        .spec-item i {
            color: var(--brand-red);
            margin-right: 10px;
        }

        .btn-rent {
            background: var(--brand-red);
            color: white;
            font-weight: bold;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-rent:hover {
            background: #cc0000;
            transform: scale(1.02);
        }

        .loading-placeholder {
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }
        .prof {
            cursor: pointer;
            transition: 0.3s;
        }
        .prof:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="index.html">vGT rent</a>
            <div class="ms-auto">
                <a href="profile.html">
                        <img onclick="onProfileClick()" src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                            alt="Profile" class="rounded-circle prof" width="35" height="35" style="margin-right: 20px;">
                    </a>
                <a href="index.html" class="btn btn-outline-light btn-sm">Back to Fleet</a>
            </div>
        </div>
    </nav>

    <div class="container detail-container">
        <div class="row g-5">
            <div class="col-lg-7">
                <div class="main-img-container" id="mainImgContainer">
                    <img id="mainImage" src="" alt="Car Image" style="display: none;">
                </div>
                <div class="thumb-group" id="thumbGroup">
                </div>
            </div>

            <div class="col-lg-5">
                <div class="info-card">
                    <h1 id="carTitle" class="fw-bold mb-1">Loading...</h1>
                    <p id="carLocation" class="text-secondary mb-4"><i class="fa-solid fa-location-dot"></i> --</p>

                    <div class="price-tag mb-4"><span id="carPrice">--</span> ₾ <small class="fs-6 text-white">/
                            დღე</small></div>

                    <div class="specs-list">
                        <div class="spec-item"><span><i class="fa-solid fa-calendar"></i> წელი:</span> <strong
                                id="carYear">--</strong></div>
                        <div class="spec-item"><span><i class="fa-solid fa-users"></i> ტევადობა:</span> <strong
                                id="carCapacity">--</strong></div>
                        <div class="spec-item"><span><i class="fa-solid fa-gears"></i> გადაცემათა კოლოფი:</span> <strong
                                id="carTrans">--</strong></div>
                        <div class="spec-item"><span><i class="fa-solid fa-gas-pump"></i> ავზი:</span> <strong
                                id="carFuel">--</strong></div>
                        <div class="spec-item"><span><i class="fa-solid fa-phone"></i> მფლობელი:</span> <strong
                                id="carOwner">--</strong></div>
                    </div>

                    <button class="btn-rent" id="rentBtn">RENT NOW</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            const params = new URLSearchParams(window.location.search);
            const carId = params.get('id');

            if (!carId) {
                Swal.fire({
                    icon: 'error',
                    title: 'შეცდომა',
                    text: 'მანქანის ID ვერ მოიძებნა!',
                    confirmButtonColor: '#3c0ac7'
                });
                return;
            }

            fetch(`https://rentcar.stepprojects.ge/api/Car/${carId}`).then(res => {
                if (!res.ok) throw new Error("მანქანა ვერ მოიძებნა");
                return res.json();
            })
                .then(car => {
                    renderCarDetails(car);
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.getElementById('carTitle').innerText = "ჩატვირთვის შეცდომა";
                });

            const rentBtn = document.getElementById("rentBtn");
            if (rentBtn) {
                rentBtn.addEventListener("click", () => {
                    const priceValue = document.getElementById("carPrice").innerText;
                    const price = parseFloat(priceValue.replace(/[^0-9.]/g, ""));
                    makePurchase(carId, price);
                });
            }
        });

        function renderCarDetails(car) {
            updateElement('carTitle', `${car.brand} ${car.model}`);
            updateElement('carPrice', `${car.dailyPrice || car.price} `);
            updateElement('carYear', car.releaseYear || car.year);
            updateElement('carLocation', car.city);
            updateElement('carCapacity', `${car.capacity} კაცი`);
            updateElement('carTrans', car.transmission);
            updateElement('carFuel', `${car.fuelVolume || 0} ლ`);
            updateElement('carOwner', car.userPhone || "არ არის მითითებული");

            const mainImg = document.getElementById('mainImage');
            const mainImgContainer = document.getElementById('mainImgContainer');
            const thumbGroup = document.getElementById('thumbGroup');

            const images = car.carImages || [car.imageUrl1, car.imageUrl2, car.imageUrl3].filter(img => img);

            if (images && images.length > 0) {
                mainImg.src = images[0];
                mainImg.style.display = "block";
                mainImgContainer.classList.remove('loading-placeholder');

                thumbGroup.innerHTML = '';
                images.forEach((imgUrl, index) => {
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.className = `thumb ${index === 0 ? 'active' : ''}`;
                    img.onclick = function () { changeImg(this); };
                    thumbGroup.appendChild(img);
                });
            }

            document.querySelectorAll('.loading-placeholder').forEach(el => el.classList.remove('loading-placeholder'));
        }

        async function makePurchase(carId, price) {
            const token = localStorage.getItem("token");

            if (!token) {
                Swal.fire({
                    icon: 'warning',
                    title: 'ავტორიზაცია საჭიროა',
                    text: 'გთხოვთ გაიაროთ ავტორიზაცია მანქანის დასაჯავშნად',
                    showCancelButton: true,
                    confirmButtonText: 'შესვლა',
                    cancelButtonText: 'გაუქმება',
                    confirmButtonColor: '#3c0ac7'
                }).then((result) => {
                    if (result.isConfirmed) window.location.href = "login.html";
                });
                return;
            }

            const phoneNumber = getPhoneFromToken(token);
            const btn = document.getElementById("rentBtn");
            const originalText = btn.innerText;

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const url = `https://rentcar.stepprojects.ge/Purchase/purchase?phoneNumber=${phoneNumber}&carId=${carId}&multiplier=1`;
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Accept": "application/json"
                    }
                });

                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'წარმატება!',
                        text: 'თქვენი ჯავშანი წარმატებით დასრულდა.',
                        confirmButtonColor: '#3c0ac7'
                    }).then(() => {
                        window.location.href = "profile.html";
                    });
                } else {
                    const errorMsg = await response.text();
                    Swal.fire({
                        icon: 'error',
                        title: 'ვერ მოხერხდა',
                        text: 'შეცდომა: ' + errorMsg,
                        confirmButtonColor: '#3c0ac7'
                    });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'კავშირის შეცდომა', text: 'სცადეთ თავიდან.', confirmButtonColor: '#3c0ac7' });
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }


        window.logout = function () {
            localStorage.removeItem("token");
            window.location.reload();
        };

        function getPhoneFromToken(token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                return payload["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/mobilephone"];
            } catch (e) { return null; }
        }

        function changeImg(element) {
            document.getElementById('mainImage').src = element.src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }

        function updateElement(id, value) {
            const el = document.getElementById(id);
            if (el) {
                el.innerText = value;
                el.classList.remove('loading-placeholder');
            }
        }
    </script>
</body>

</html>
