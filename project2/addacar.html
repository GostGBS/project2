<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vGT Rental | Add Car</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --brand-red: #ff0000;
            --dark-bg: #000;
            --card-bg: #0a0a0a;
            --input-bg: #111;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        .container {
            max-width: 900px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h4 {
            color: white;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-back {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-back:hover {
            color: var(--brand-red);
        }

        .form-label {
            color: #aaa;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-control, .form-select {
            background-color: var(--input-bg);
            border: 1px solid #222;
            color: white;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            background-color: #161616;
            border-color: var(--brand-red);
            color: white;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: #444;
        }

        /* Grid for Inputs */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .image-upload-section {
            grid-column: span 2;
            background: #050505;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #333;
            margin-top: 10px;
        }

        @media (max-width: 768px) { .image-upload-section { grid-column: span 1; } }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .btn-primary {
            background: var(--brand-red);
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #cc0000;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #333;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 8px;
            color: white;
        }

        .btn-secondary:hover {
            background: #222;
            border-color: #444;
        }

        input[type="file"] {
            font-size: 0.8rem;
        }

        input[type="file"]::file-selector-button {
            background: #222;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h4><i class="fas fa-car-side text-danger me-2"></i> ავტომობილის დამატება</h4>
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left me-1"></i> მთავარზე დაბრუნება</a>
        </div>
        
        <form onsubmit="addCar(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="brand">Brand</label>
                    <input type="text" class="form-control" id="brand" required placeholder="brand">
                </div>
                <div class="form-group">
                    <label class="form-label" for="model">Model</label>
                    <input type="text" class="form-control" id="model" required placeholder="model">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="year">Year</label>
                    <input type="number" class="form-control" id="year" required placeholder="year">
                </div>
                <div class="form-group">
                    <label class="form-label" for="price">Price (GEL / Day)</label>
                    <input type="number" step="0.01" class="form-control" id="price" required placeholder="0">
                </div>

                <div class="form-group">
                    <label class="form-label" for="capacity">Seats Capacity</label>
                    <input type="number" class="form-control" id="capacity" required placeholder="capacity">
                </div>
                <div class="form-group">
                    <label class="form-label" for="fuelCapacity">Fuel Capacity (L)</label>
                    <input type="number" class="form-control" id="fuelCapacity" required placeholder="fuel capacity">
                </div>

                <div class="form-group">
                    <label class="form-label" for="transmission">Transmission</label>
                    <select class="form-select" id="transmission" required>
                        <option value="">აირჩიეთ...</option>
                        <option value="Automatic">Automatic</option>
                        <option value="Manual">Manual</option>
                        <option value="Tiptronic">Tiptronic</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="city">City</label>
                    <input type="text" class="form-control" id="city" required placeholder="city">
                </div>

                <div class="form-group">
                    <label class="form-label" for="createdBy">თქვენი სახელი</label>
                    <input type="text" class="form-control" id="createdBy" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" required placeholder="example@mail.com">
                </div>

                <div class="image-upload-section">
                    <label class="form-label"><i class="fas fa-images me-2"></i> ატვირთეთ სურათები (მაქს. 3)</label>
                    <div class="row g-2 mt-1">
                        <div class="col-md-4">
                            <input type="file" id="image1" class="form-control" accept="image/*">
                        </div>
                        <div class="col-md-4">
                            <input type="file" id="image2" class="form-control" accept="image/*">
                        </div>
                        <div class="col-md-4">
                            <input type="file" id="image3" class="form-control" accept="image/*">
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="reset" class="btn btn-secondary">გასუფთავება</button>
                <button type="submit" class="btn btn-primary">ავტომობილის დამატება</button>
            </div>
        </form>
    </div>
</div>

<script>
    // [აქ რჩება შენი უცვლელი JS ფუნქცია: addCar და parseJwt]
    async function addCar(event) {
        event.preventDefault();

        const token = localStorage.getItem('token');
        if (!token) {
            Swal.fire('Error', 'გთხოვთ გაიაროთ ავტორიზაცია!', 'error');
            return;
        }

        const formData = new FormData();
        formData.append('Brand', document.getElementById("brand").value);
        formData.append('Model', document.getElementById("model").value);
        formData.append('Year', parseInt(document.getElementById("year").value));
        formData.append('Price', parseFloat(document.getElementById("price").value));
        formData.append('City', document.getElementById("city").value);
        formData.append('Transmission', document.getElementById("transmission").value);
        formData.append('Capacity', parseInt(document.getElementById("capacity").value));
        formData.append('FuelCapacity', parseInt(document.getElementById("fuelCapacity").value));
        formData.append('CreatedBy', document.getElementById("createdBy").value);
        formData.append('CreatedByEmail', document.getElementById("email").value);
        
        formData.append('Latitude', '41.7151');
        formData.append('Longitude', '44.8271');

        const fileInput1 = document.getElementById("image1").files[0];
        const fileInput2 = document.getElementById("image2").files[0];
        const fileInput3 = document.getElementById("image3").files[0];

        if (fileInput1) formData.append('Image1', fileInput1);
        if (fileInput2) formData.append('Image2', fileInput2);
        if (fileInput3) formData.append('Image3', fileInput3);

        const userPhone = parseJwt(token);
        if (userPhone) formData.append('OwnerPhoneNumber', userPhone);

        try {
            Swal.fire({ 
                title: 'მიმდინარეობს გაგზავნა...', 
                background: '#0a0a0a',
                color: '#fff',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading() 
            });

            await axios.post("https://rentcar.stepprojects.ge/api/Car", formData, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'multipart/form-data'
                }
            });

            await Swal.fire({
                title: 'წარმატება!',
                text: 'მანქანა წარმატებით დაემატა!',
                icon: 'success',
                confirmButtonColor: '#ff0000'
            });
            window.location.href = "index.html";

        } catch (error) {
            console.error("Error Detail:", error.response?.data);
            const errorMsg = error.response?.data?.message || "სერვერმა მონაცემები ვერ მიიღო.";
            Swal.fire('შეცდომა', errorMsg, 'error');
        }
    }

    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(atob(base64));
            return payload["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/mobilephone"];
        } catch (e) { return null; }
    }
</script>

</body>
</html>
