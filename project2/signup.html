<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        #main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 99vh;
            margin: 0;
        }

        .card {
            width: 400px;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .card-body {
            display: flex;
            flex-direction: column;
        }

        .form-control {
            margin-bottom: 15px;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        .card-footer {
            text-align: center;
            margin-top: 10px;
        }

        .card-footer a {
            color: #007bff;
            text-decoration: none;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        #left {
            width: 50%;
            margin: 0;


        }

        #right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            ;

        }

        #right img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            position: absolute;
            left: 150px;
        }
    </style>
</head>

<body>
    <div class="container" id="main">
        <div class="container" id="left">
            <div class="row justify-content-center">
                <div class="col-md-5 col-12">
                    <div class="card mt-4">
                        <div class="card-body">
                            <form method="post" onsubmit="signup(event)">
                                <h2 style="color: red; text-align: center; margin: 0; padding-bottom: 10px;">vGT</h2>
                                <input type="text" id="firstname" placeholder="First name" class="form-control mb-3"
                                    required>
                                <input type="text" id="lastname" placeholder="Last name" class="form-control mb-3"
                                    required>
                                <input type="email" id="email" placeholder="Email" class="form-control mb-3" required>
                                <input type="tel" id="phone" placeholder="Phone" class="form-control mb-3" required>
                                <input type="text" id="role" placeholder="Role" class="form-control mb-3" required>
                                <input type="password" id="password" placeholder="Password" class="form-control mb-3"
                                    required>
                                <input type="submit" class="btn btn-primary form-control" value="Sign up">
                            </form>
                        </div>
                        <div class="card-footer">
                            <p>
                                უკვე გაქვთ ანგარიში? გაიარე <a href="loginn.html">ავტორიზაცია</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="container" id="right">
            <img src="pngtree-car-dealer-showroom-flat-illustration-png-image_5426815.jpg" alt="">
        </div>
    </div>

    <script>
        function signup(event) {
            event.preventDefault();

            axios.post("https://rentcar.stepprojects.ge/api/Users/register", {
                "phoneNumber": document.getElementById("phone").value,
                "password": document.getElementById("password").value,
                "email": document.getElementById("email").value,
                "firstName": document.getElementById("firstname").value,
                "lastName": document.getElementById("lastname").value,
                "role": document.getElementById("role").value
            }).then(function (res) {
                console.log(res);
            }).catch(function (erro) {
                console.log(erro);
            })
        }

        function signup(event) {
            event.preventDefault();

            let firstname = document.getElementById("firstname").value;
            let lastname = document.getElementById("lastname").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let role = document.getElementById("role").value;
            let password = document.getElementById("password").value;
            if (firstname == "" || lastname == "" || email == "" || phone == "" || role == "" || password == "") {
                alert("Please fill in all fields");
                return;
            }

            window.location.href = "loginn.html";
        }
    </script>
</body>

</html>
