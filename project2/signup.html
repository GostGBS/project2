<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vGT | Join the Fleet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #000; 
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
        }

        
        #main-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        #left-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            z-index: 2;
        }


        @media (min-width: 992px) {
            #right-side { display: block; }
        }

        
        .signup-card {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: transform 0.3s ease;
        }

        .signup-card:hover {
            transform: translateY(-5px);
        }

        .brand-logo {
            color: #ff0000;
            font-weight: 800;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 15px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff0000;
            color: white;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: #666;
        }

        
        .btn-signup {
            background: #ff0000;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-signup:hover {
            background: #cc0000;
            transform: scale(1.02);
        }

        .card-footer {
            border: none;
            background: transparent;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        .card-footer a {
            color: #ff0000;
            text-decoration: none;
            font-weight: bold;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="main-wrapper">
        <div id="left-side">
            <div class="signup-card">
                <h1 class="brand-logo">vGT</h1>
                <p class="subtitle">Join our exclusive rental network</p>
                
                <form onsubmit="handleSignup(event)">
                    <div class="row g-2">
                        <div class="col-6">
                            <input type="text" id="firstname" placeholder="First Name" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <input type="text" id="lastname" placeholder="Last Name" class="form-control" required>
                        </div>
                    </div>
                    <input type="email" id="email" placeholder="Email Address" class="form-control" required>
                    <input type="tel" id="phone" placeholder="Phone Number" class="form-control" required>
                    <input type="text" id="role" placeholder="Desired Role (e.g. Client)" class="form-control" required>
                    <input type="password" id="password" placeholder="Create Password" class="form-control" required>
                    
                    <button type="submit" class="btn btn-signup w-100">Create Account</button>
                </form>

                <div class="card-footer">
                    უკვე გაქვთ ანგარიში? <a href="loginn.html">ავტორიზაცია</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function handleSignup(event) {
            event.preventDefault();

            const userData = {
                firstName: document.getElementById("firstname").value,
                lastName: document.getElementById("lastname").value,
                email: document.getElementById("email").value,
                phoneNumber: document.getElementById("phone").value,
                role: document.getElementById("role").value,
                password: document.getElementById("password").value
            };

            try {
                
                Swal.fire({
                    title: 'Processing...',
                    didOpen: () => { Swal.showLoading() }
                });

                const response = await axios.post("https://rentcar.stepprojects.ge/api/Users/register", userData);

                await Swal.fire({
                    title: "Welcome to vGT!",
                    text: "Your account has been created successfully.",
                    icon: "success",
                    confirmButtonColor: "#ff0000"
                });

                window.location.href = "loginn.html";

            } catch (error) {
                console.error(error);
                Swal.fire({
                    title: "Registration Failed",
                    text: error.response?.data?.message || "Something went wrong. Please try again.",
                    icon: "error",
                    confirmButtonColor: "#ff0000"
                });
            }
        }
    </script>
</body>

</html>
