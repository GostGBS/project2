<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vGT | My Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --brand-red: #ff0000;
            --dark-bg: #000;
            --card-grad: linear-gradient(135deg, #111 0%, #000 100%);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding-top: 90px;
        }

        .profile-sidebar {
            background: var(--card-grad);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 30px;
            position: sticky;
            top: 100px;
        }

        .profile-big-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--brand-red);
            margin-bottom: 15px;
        }

        .section-title {
            border-left: 4px solid var(--brand-red);
            padding-left: 15px;
            margin-bottom: 25px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mini-card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            margin-bottom: 20px;
            height: 100%;
        }

        .mini-card:hover {
            border-color: var(--brand-red);
        }

        .mini-card img {
            height: 120px;
            width: 100%;
            object-fit: cover;
        }

        .mini-card-body {
            padding: 10px;
            text-align: center;
        }

        .navbar {
            background-color: #000 !important;
            border-bottom: 1px solid #222;
        }

        .history-card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="index.html">vGT rent</a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm">Return to Fleet</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="profile-sidebar text-center">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-big-img">
                    <h3 class="fw-bold" id="dashName">Loading...</h3>
                    <p class="text-secondary small">Premium Member</p>
                    <hr class="border-secondary">
                    <div class="text-start mt-3">
                        <p><i class="fa-solid fa-envelope text-danger me-2"></i> <span id="dashEmail">---</span></p>
                        <p><i class="fa-solid fa-phone text-danger me-2"></i> <span id="dashPhone">---</span></p>
                    </div>
                    <div class="d-flex gap-2 justify-content-center">
                        <button class="btn btn-danger w-50" onclick="handleLogout()">Log Out</button>
                        <a href="addacar.html" class="btn btn-outline-danger w-50">Add a car</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="mb-5">
                    <h4 class="section-title">My Rental History</h4>
                    <div id="history-list">
                        <p class="text-secondary">Checking history...</p>
                    </div>
                </div>

                <div id="favorites-section">
                    <h4 class="section-title">My Favorites</h4>
                    <div class="row" id="likedCars">
                        <p class="text-secondary text-center">Loading favorites...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem("token");
        if (!token) { 
            window.location.href = "loginn.html"; 
            return; 
        }

        const userPhone = getPhoneFromToken(token);
        if (!userPhone) { 
            window.location.href = "loginn.html"; 
            return; 
        }

        loadUserData(userPhone, token);
        loadPurchaseHistory(userPhone, token);
        loadUserFavorites();   
    });

    function getPhoneFromToken(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(atob(base64));
            return payload["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/mobilephone"];
        } catch (e) { return null; }
    }

    async function loadUserData(phone, token) {
        try {
            const response = await fetch(`https://rentcar.stepprojects.ge/api/Users/${phone}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const user = await response.json();
            document.getElementById("dashName").innerText = user.firstName + " " + (user.lastName || "");
            document.getElementById("dashEmail").innerText = user.email || "---";
            document.getElementById("dashPhone").innerText = phone || "---";
        } catch (error) { 
            console.error("User Data Error:", error); 
        }
    }

    async function loadPurchaseHistory(phone, token) {
        const container = document.getElementById("history-list");
        try {
            const response = await fetch(`https://rentcar.stepprojects.ge/Purchase/${phone}`, {
                method: "GET",
                headers: { 'Authorization': `Bearer ${token}`, 'Accept': '*/*' }
            });

            if (response.ok) {
                const historyData = await response.json();
                renderHistory(historyData);
            } else {
                container.innerHTML = "<p class='text-secondary'>No rental history found.</p>";
            }
        } catch (error) {
            container.innerHTML = "<p class='text-danger'>Error loading history.</p>";
        }
    }

    function renderHistory(items) {
        const container = document.getElementById("history-list");
        if (!items || items.length === 0) {
            container.innerHTML = "<p class='text-secondary'>Your garage is empty.</p>";
            return;
        }

        container.innerHTML = items.map(item => `
            <div class="history-card">
                <div class="d-flex align-items-center gap-3">
                    <div class="text-danger fs-4"><i class="fas fa-car"></i></div>
                    <div>
                        <h5 class="mb-0">${item.carBrand || item.brand || 'Car'} ${item.carModel || item.model || ''}</h5>
                        <small class="text-secondary">Order ID: #${item.carId || item.id}</small>
                    </div>
                </div>
                <div class="text-end">
                    <div class="fw-bold text-white">${item.pricePaid || item.price || '---'} GEL</div>
                    <small class="text-secondary">${new Date(item.rentalDate || item.date || Date.now()).toLocaleDateString()}</small>
                </div>
            </div>
        `).join('');
    }

    

async function loadUserFavorites() {
    const favoriteContainer = document.getElementById('likedCars');
    if (!favoriteContainer) return;

    const token = localStorage.getItem("token");
    if (!token) return;

    const phoneNumber = getPhoneFromToken(token);
    if (!phoneNumber) return;

    try {
        const response = await fetch(`https://rentcar.stepprojects.ge/api/Users/${phoneNumber}/favorite-cars`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
            favoriteContainer.innerHTML = `<p class="text-secondary text-center">No favorites yet.</p>`;
            return;
        }

        const favorites = await response.json();

        if (!favorites || favorites.length === 0) {
            favoriteContainer.innerHTML = `<p class="text-secondary text-center">No favorites yet. Start liking some cars from the fleet!</p>`;
            return;
        }

        favoriteContainer.innerHTML = favorites.map(car => `
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="mini-card" onclick="window.location.href='carpage.html?id=${car.id}'" style="cursor:pointer;">
                    <img src="${car.imageUrl1 || car.img || 'https://via.placeholder.com/300x200'}" alt="${car.brand || car.name}">
                    <div class="mini-card-body">
                        <h6 class="mb-1 fw-bold">${car.brand || ''} ${car.model || car.name || ''}</h6>
                        <small class="text-secondary">Click to view details</small>
                    </div>
                </div>
            </div>
        `).join('');

    } catch (error) {
        console.error("Favorites load error:", error);
        favoriteContainer.innerHTML = `<p class="text-danger text-center">Error loading favorites.</p>`;
    }
}

    function handleLogout() {
        localStorage.clear();
        window.location.href = "index.html";
    }
</script>
</body>

</html>
