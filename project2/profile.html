<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vGT | My Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-red: #ff0000;
            --dark-bg: #000;
            --card-grad: linear-gradient(135deg, #111 0%, #000 100%);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding-top: 90px;
        }

        /* Profile Sidebar (Left Side) */
        .profile-sidebar {
            background: var(--card-grad);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 30px;
            position: sticky;
            top: 100px;
        }

        .profile-big-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--brand-red);
            margin-bottom: 15px;
        }

        /* Section Headers */
        .section-title {
            border-left: 4px solid var(--brand-red);
            padding-left: 15px;
            margin-bottom: 25px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Small Car Cards for Dashboard */
        .mini-card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .mini-card:hover { border-color: var(--brand-red); }
        .mini-card img { height: 120px; width: 100%; object-fit: cover; }
        .mini-card-body { padding: 10px; text-align: center; }

        /* Navbar Re-style to match yours */
        .navbar { background-color: #000 !important; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="index.html">vGT rent</a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm">Return to Fleet</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            
            <div class="col-lg-4">
                <div class="profile-sidebar text-center">
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-big-img">
                    <h3 class="fw-bold" id="dashName">Driver Name</h3>
                    <p class="text-secondary small">Premium Member</p>
                    <hr class="border-secondary">
                    <div class="text-start mt-3">
                        <p><i class="fa-solid fa-envelope text-danger me-2"></i> driver@vgt.ge</p>
                        <p><i class="fa-solid fa-calendar text-danger me-2"></i> Joined: 2026</p>
                    </div>
                    <button class="btn btn-danger w-100 mt-3" onclick="logout()">Log Out</button>
                </div>
            </div>

            <div class="col-lg-8">
                
                <div class="mb-5">
                    <h4 class="section-title">My Garage (Active Rentals)</h4>
                    <div class="row" id="rentedCars">
                        <div class="col-md-6">
                            <div class="mini-card">
                                <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400">
                                <div class="mini-card-body">
                                    <h6 class="mb-0">Porsche 911</h6>
                                    <small class="text-danger">Expires in 2 days</small>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 text-center text-secondary py-4" id="noRentals" style="display:none;">
                            No active rentals yet.
                        </div>
                    </div>
                </div>

                <div>
                    <h4 class="section-title">My Favorites</h4>
                    <div class="row" id="likedCars">
                        <div class="col-12 text-center text-secondary py-5">
                            <i class="fa-regular fa-heart fa-2x mb-2"></i>
                            <p>You haven't liked any cars yet.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
    loadLikedCars();
});

function loadLikedCars() {
    const container = document.getElementById('likedCars');
    const favorites = JSON.parse(localStorage.getItem("vgt_favorites")) || [];

    if (favorites.length === 0) {
        container.innerHTML = '<div class="col-12 text-center text-secondary py-5"><p>No favorites yet.</p></div>';
        return;
    }

    container.innerHTML = favorites.map(car => `
        <div class="col-md-6 mb-3">
            <div class="mini-card">
                <img src="${car.img}">
                <div class="mini-card-body">
                    <h6 class="mb-1">${car.name}</h6>
                    <button class="btn btn-sm btn-outline-danger" onclick="removeFromFavs('${car.id}')">
                        <i class="fa-solid fa-trash"></i> Remove
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function removeFromFavs(carId) {
    let favorites = JSON.parse(localStorage.getItem("vgt_favorites")) || [];
    favorites = favorites.filter(c => c.id !== carId);
    localStorage.setItem("vgt_favorites", JSON.stringify(favorites));
    loadLikedCars(); // Refresh the list
}
    </script>
</body>
</html>
