<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title style="color: red;">vGT Rental</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .continer {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            width: 100%;

        }

        .box {
            margin-top: 60px;
            width: 90%;
            height: 95vh;
            background-image: url(close-up-red-luxury-car-on-black-background-with-copy-space-photo.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-size: 100vw 100vh;
            border-radius: 20px;
            display: flex;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .box:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }

        .textbox {
            width: 70%;
            height: 50%;
            color: white;
            border-radius: 20px;
            position: absolute;
            left: 140px;
            top: 80px;
            font-size: 24px;
            font-weight: bold;
            font-size: 30px;
            font: sans-serif;

        }

        #fir {
            width: 150px;
            height: 50px;
            background-color: white;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        #sec {
            width: 200px;
            height: 50px;
            background-color: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: duration 0.3s ease;
        }

        #fir:hover {
            background-color: #a8a6a6;
            transition: background-color 0.3s ease;

        }

        #sec:hover {
            background-color: white;
            color: black;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .cardd {
            width: 350px;
            height: 470px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, red 0%, black 100%);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 1px rgba(255, 255, 255, 0.1) inset;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .cardd:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }

        .cardd img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .cardd:hover img {
            transform: scale(1.05);
        }

        .cardd h5 {
            font-size: 20px;
            font-weight: 700;
            margin-top: 16px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .cardd p {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .rent-btn {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .rent-btn:hover {
            background-color: #0052a3;
        }

        .buta:hover {
            background-color: white;
            color: black;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .buta {
            width: 200px;
            height: 50px;
            background-color: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: duration 0.3s ease;
        }

        .po {
            margin-top: 20px;
        }

        .gt {

            margin: 20px 0px 0px 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            border: 1px solid rgb(194, 192, 192);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 1px rgba(255, 255, 255, 0.1) inset;

        }

        #roww {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;


        }

        .slide {
            width: 100%;
            height: 200px;
            margin-top: 50px;
            border-radius: 20px;
            border: 1px solid rgb(194, 192, 192);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .custom-carousel {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgb(194, 192, 192);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 1px rgba(255, 255, 255, 0.1) inset;
            margin-top: 50px;
            border-radius: 20px;
        }

        .carousel-track {
            display: flex;
            overflow-x: hidden;
            scroll-behavior: smooth;
            gap: 15px;
            width: 100%;
        }

        .carousel-track img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            flex-shrink: 0;
            transition: transform 0.3s ease;

        }

        .carousel-track img:hover {
            transform: scale(1.05);
            transition: transform 0.3s ease;
        }

        .prev, .next {
            border: none;
        }
    </style>
</head>

<body>
    <nav>
        <div class="container">
            <div class="row fixed-top bg-light ">
                <div class="col-6" style="background-color: black; padding-left: 20px;">
                    <h1 style="color: red; font-weight: bold;">vGT rent</h1>
                </div>
                <div class="col-6 d-flex justify-content-end align-items-center "
                    style="background-color: black; padding-right: 30px;">
                    <a href="#textb" style="color: white; text-decoration: none; margin-right: 20px;">Home</a>
                    <a href="#" style="color: white; text-decoration: none; margin-right: 20px;">Rent</a>
                    <a href="signup.html" style="color: white; text-decoration: none; margin-right: 20px;">Sign up</a>
                    <a href="loginn.html" style="color: white; text-decoration: none; ">Log in</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="continer" id="textb">
        <div class="box">
            <div class="textbox">
                <h1 style="margin: 0;">Your Road Awaits.</h1>
                <h1 style="margin-top: 0;">Rent With Us Today!</h1>
                <h3>Discover a Fleet of Quality Vehicles,<br> Seamless Booking, and Unbeatable<br> Service with vGT rent
                </h3>
                <button id="fir">Rent a Car</button>
                <button id="sec">Discover our fleet</button>
            </div>
        </div>
    </div>
    <div class="container " style="width: 100%;">
        <div class="custom-carousel">
            <button class="prev">‹</button>

            <div class="carousel-track"></div>

            <button class="next">›</button>
        </div>
    </div>

    <div class="container mt-5 gt">
        <div class="row" id="roww">

        </div>
    </div>


    <script>
        fetch("https://rentcar.stepprojects.ge/api/Car").then(function (response) {
            return response.json();
        }).then(function (products) {
            products.forEach(function (product) {
                var colu = document.createElement("div");
                colu.className = "col-md-4 mb-4";

                var card = document.createElement("div");
                card.className = "card cardd";

                var name = document.createElement("h5");
                name.textContent = product.brand + " " + product.model;
                name.className = "mt-3";

                var img = document.createElement("img");
                img.src = product.imageUrl1;
                img.src = product.imageUrl2;
                img.src = product.imageUrl3;

                var desc = document.createElement("p");
                desc.textContent = product.price + " GEL per day";
                desc.className = "po";

                var button = document.createElement("button");
                button.textContent = "Rent Now";
                button.className = "buta";

                card.appendChild(name);
                card.appendChild(img);
                card.appendChild(desc);
                card.appendChild(button);
                colu.appendChild(card);
                document.querySelector("#roww").appendChild(colu);
            })
        })

        fetch("https://rentcar.stepprojects.ge/api/Car/popular")
            .then(res => res.json())
            .then(cars => {

                const track = document.querySelector(".carousel-track");

                cars.forEach(car => {

                    const images = [car.imageUrl1, car.imageUrl2, car.imageUrl3];

                    images.forEach(url => {

                        if (url) {   // თუ არსებობს
                            const img = document.createElement("img");
                            img.src = url;
                            track.appendChild(img);
                        }

                    });

                });

            });

        document.querySelector(".next").addEventListener("click", function () {
            document.querySelector(".carousel-track").scrollBy({
                left: 315,
                behavior: "smooth"
            });
        });

        document.querySelector(".prev").addEventListener("click", function () {
            document.querySelector(".carousel-track").scrollBy({
                left: -315,
                behavior: "smooth"
            });
        });
    </script>
</body>

</html>
